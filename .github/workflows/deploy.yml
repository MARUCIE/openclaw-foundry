name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd web && npm ci

      - name: Sync skills data (daily cron + manual dispatch)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          node scripts/scrape-clawhub-api.mjs --process
          node scripts/scrape-mcp-registry.mjs
          node scripts/merge-all-sources.mjs

      - name: Prebuild static data (no API, use local JSON files)
        run: node scripts/prebuild-static.mjs --no-api

      - name: Build Next.js static export
        run: cd web && npx next build

      - name: Deploy to CF Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/out --project-name openclaw-foundry --branch main --commit-dirty=true

  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

  seed-db:
    runs-on: ubuntu-latest
    needs: [deploy-worker, deploy-frontend]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate seed SQL
        run: node scripts/generate-seed-sql.mjs

      - name: Seed D1 database (batched for large datasets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd worker
          # Clear existing data
          npx wrangler d1 execute openclaw-foundry --remote --command "DELETE FROM skills; DELETE FROM providers;"
          # Split seed into 10K-line batches and execute sequentially
          head -20 src/seed.sql > /tmp/seed-header.sql
          npx wrangler d1 execute openclaw-foundry --remote --file=/tmp/seed-header.sql
          tail -n +21 src/seed.sql | split -l 10000 - /tmp/seed-batch-
          for f in /tmp/seed-batch-*; do
            echo "Seeding batch: $f ($(wc -l < $f) lines)"
            npx wrangler d1 execute openclaw-foundry --remote --file="$f"
          done
          # Verify
          npx wrangler d1 execute openclaw-foundry --remote --command "SELECT COUNT(*) as total FROM skills" --json | grep total
